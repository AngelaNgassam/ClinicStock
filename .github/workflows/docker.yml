# Nom du pipeline visible dans l'onglet Actions de GitHub
name: Python CI/CD Pipeline

# Déclenchement du pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ---------------------------
  # JOB 1 : CONTINUOUS INTEGRATION
  # ---------------------------
  ci:
    runs-on: ubuntu-latest

    steps:

      # Récupère le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installe Python sur la machine virtuelle
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Installe les dépendances système pour mysqlclient
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev gcc pkg-config

      # Installe les dépendances du projet
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Vérifie la qualité du code
      - name: Code quality check
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,migrations,backend/clinicstock/settings.py

      # Compilation Python (vérification syntaxe)
      - name: Compile Python files
        run: |
          python -m compileall backend/

      # Lance les tests automatiques
      - name: Run tests
        run: |
          pip install pytest pytest-django
          cd backend
          pytest
        env:
          DJANGO_SETTINGS_MODULE: clinicstock.settings

      # Produit un artefact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-build
          path: backend/

  # ---------------------------
  # JOB 2 : CONTINUOUS DEPLOYMENT
  # ---------------------------
  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t angelangassam/clinicstock ./backend

      - name: Push Docker image
        run: docker push angelangassam/clinicstock