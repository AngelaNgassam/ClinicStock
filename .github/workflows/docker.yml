# Nom du pipeline visible dans l'onglet Actions de GitHub
name: Python CI/CD Pipeline

# Déclenchement du pipeline
on:
  # Exécution lorsque du code est envoyé (push)
  push:
    branches:
      - main

  # Exécution lorsqu'une pull request est créée ou modifiée
  pull_request:
    branches:
      - main


# Définition des jobs
jobs:

  # ---------------------------
  # JOB 1 : CONTINUOUS INTEGRATION
  # ---------------------------
  ci:

    # Machine virtuelle utilisée par GitHub
    runs-on: ubuntu-latest

    steps:

      # Récupère le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v3

      # Installe Python sur la machine virtuelle
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Installe les dépendances du projet
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Vérifie la qualité du code (clean code)
      # flake8 analyse le style, les erreurs et les mauvaises pratiques
      - name: Code quality check
        run: |
          pip install flake8
          flake8 .

      # Compilation Python (vérification syntaxe)
      # compile tous les fichiers python
      - name: Compile Python files
        run: |
          python -m compileall .

      # Lance les tests automatiques
      - name: Run tests
        run: |
          pip install pytest
          pytest

      # Produit un artefact (ex: code compilé ou package)
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: python-build
          path: .


  # ---------------------------
  # JOB 2 : CONTINUOUS DEPLOYMENT
  # ---------------------------
  cd:

    # Ce job s'exécute seulement si le job CI a réussi
    needs: ci

    # Machine virtuelle utilisée
    runs-on: ubuntu-latest

    steps:

      # Récupère le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construction de l'image Docker
      - name: Build Docker image
        run: docker build -t angelangassam/clinicstock .

      # Publication de l'image Docker sur Docker Hub
      - name: Push Docker image
        run: docker push angelangassam/clinicstock
